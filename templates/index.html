<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-MAX GP レギュナビ Mr.永見</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Zen+Kaku+Gothic+New:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
</head>
<body>
    <!-- 言語は日本語固定（英語UI・モーダルは非表示） -->
    
    <!-- 固定ヘッダー -->
    <header class="fixed-header">
        <div class="header-content">
            <div class="title-container">
                <h1 class="main-title">
                    <span class="title-kyo">B-MAX GP</span>
                    <span class="title-yuzen">レギュナビ</span>
                    <span class="title-name">Mr.永見</span>
                </h1>
            </div>
            
            <!-- 固定コントロールボタン -->
            <div class="fixed-controls">
                <button id="mute-button" class="control-button mute-button" title="音声のオン/オフ">
                    🔊
                </button>
            </div>
        </div>
    </header>
    
    <!-- メインコンテンツ -->
    <div class="main-wrapper">
        <div class="container">
            <!-- メインコンテンツエリア -->
            <div class="main-content">
                <!-- 左側：アバターエリア（固定） -->
                <div class="avatar-section">
                    <div class="avatar-placeholder">
                        <iframe id="unity-frame" src="{{ url_for('static', filename='unity/Unity_index.html') }}" width="100%" height="100%" frameborder="0"></iframe>
                    </div>
                </div>
                
                <!-- 右側：チャットエリア（スクロール可能） -->
                <div class="chat-section">
                    <div class="chat-container">
                        <div id="chat-messages" class="chat-messages"></div>
                        <div class="input-area collapsed" id="input-area">
                            <button class="input-toggle-button" id="input-toggle">
                                <i>💬</i>
                                <span>メッセージを入力</span>
                            </button>
                            <div class="input-form-container">
                                <textarea id="message-input" placeholder="メッセージを入力..."></textarea>
                                <div class="button-area">
                                    <button id="send-button">送信</button>
                                    <button id="voice-button">🎤</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
